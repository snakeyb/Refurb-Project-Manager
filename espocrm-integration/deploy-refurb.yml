---
- name: Deploy RefurbProject integration to EspoCRM
  hosts: espocrm_prod
  become: true

  vars:
    github_repo: "https://github.com/snakeyb/Refurb-Project-Manager.git"
    github_branch: "main"
    refurb_app_url: "https://479ed0c8-5673-43c8-8e02-49f2559e1247-00-29kylpvxjmwor.spock.replit.dev"
    espocrm_root: "/var/www/html"
    espocrm_user: "www-data"
    espocrm_group: "www-data"
    tmp_clone_dir: "/tmp/refurb-deploy-{{ ansible_date_time.epoch }}"

  tasks:
    - name: Install git if not present
      ansible.builtin.package:
        name: git
        state: present

    - name: Clone repository to temp directory
      ansible.builtin.git:
        repo: "{{ github_repo }}"
        dest: "{{ tmp_clone_dir }}"
        version: "{{ github_branch }}"
        depth: 1

    - name: Create EspoCRM custom metadata directories
      ansible.builtin.file:
        path: "{{ espocrm_root }}/{{ item }}"
        state: directory
        owner: "{{ espocrm_user }}"
        group: "{{ espocrm_group }}"
        mode: "0755"
      loop:
        - custom/Espo/Custom/Resources/metadata/entityDefs
        - custom/Espo/Custom/Resources/metadata/scopes
        - custom/Espo/Custom/Resources/metadata/clientDefs
        - custom/Espo/Custom/Resources/layouts/RefurbProject
        - custom/Espo/Custom/Resources/i18n/en_US
        - custom/Espo/Custom/Controllers
        - custom/Espo/Custom/Entities
        - client/custom/src

    - name: Copy RefurbProject entity definition files
      ansible.builtin.copy:
        src: "{{ tmp_clone_dir }}/espocrm-integration/custom/Espo/Custom/Resources/{{ item }}"
        dest: "{{ espocrm_root }}/custom/Espo/Custom/Resources/{{ item }}"
        owner: "{{ espocrm_user }}"
        group: "{{ espocrm_group }}"
        mode: "0644"
        remote_src: true
      loop:
        - metadata/entityDefs/RefurbProject.json
        - metadata/scopes/RefurbProject.json
        - metadata/clientDefs/RefurbProject.json
        - metadata/clientDefs/Global.json
        - layouts/RefurbProject/list.json
        - layouts/RefurbProject/detail.json
        - i18n/en_US/RefurbProject.json
        - i18n/en_US/Global.json

    - name: Copy RefurbProject PHP classes
      ansible.builtin.copy:
        src: "{{ tmp_clone_dir }}/espocrm-integration/custom/Espo/Custom/{{ item }}"
        dest: "{{ espocrm_root }}/custom/Espo/Custom/{{ item }}"
        owner: "{{ espocrm_user }}"
        group: "{{ espocrm_group }}"
        mode: "0644"
        remote_src: true
      loop:
        - Controllers/RefurbProject.php
        - Entities/RefurbProject.php

    - name: Copy button action handler
      ansible.builtin.copy:
        src: "{{ tmp_clone_dir }}/espocrm-integration/client/custom/src/refurb-handler.js"
        dest: "{{ espocrm_root }}/client/custom/src/refurb-handler.js"
        owner: "{{ espocrm_user }}"
        group: "{{ espocrm_group }}"
        mode: "0644"
        remote_src: true

    - name: Replace placeholder URL in button handler
      ansible.builtin.replace:
        path: "{{ espocrm_root }}/client/custom/src/refurb-handler.js"
        regexp: "\\{\\{REFURB_APP_URL\\}\\}"
        replace: "{{ refurb_app_url }}"

    - name: Remove old button handler files if present
      ansible.builtin.file:
        path: "{{ espocrm_root }}/client/custom/src/views/{{ item }}/refurb-button.js"
        state: absent
      loop:
        - opportunity
        - lead
      ignore_errors: true

    - name: Clear EspoCRM cache
      ansible.builtin.command:
        cmd: php clear_cache.php
        chdir: "{{ espocrm_root }}"
      changed_when: true

    - name: Rebuild EspoCRM
      ansible.builtin.command:
        cmd: php rebuild.php
        chdir: "{{ espocrm_root }}"
      changed_when: true

    - name: Clean up temp clone directory
      ansible.builtin.file:
        path: "{{ tmp_clone_dir }}"
        state: absent
